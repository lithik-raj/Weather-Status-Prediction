<!doctype html>
<html>
  <head>
    <title>Weather Prediction</title>

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>

  <body>
    <div class="card">
      <h1>🌦️ Weather Condition Predictor</h1>

      <p class="subtitle">AI Powered Weather Prediction System</p>

      <form action="/predict" method="POST">
        <input
          type="number"
          step="any"
          name="temperature"
          placeholder="🌡 Temperature"
          required
        />

        <input
          type="number"
          step="any"
          name="humidity"
          placeholder="💧 Humidity"
          required
        />

        <input
          type="number"
          step="any"
          name="windspeed"
          placeholder="🌪 Wind Speed"
          required
        />

        <input
          type="number"
          step="any"
          name="rainfall"
          placeholder="🌧 Rainfall"
          required
        />

        <button type="submit">🚀 Predict Weather</button>
      </form>
    </div>
  </body>
</html>
